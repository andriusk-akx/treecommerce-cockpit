# Railway deployment config — Dockerfile-driven build & start.
#
# Build/start commands live in the Dockerfile so the same image works
# locally (`docker build && docker run`) and on Railway. railway.toml
# only configures healthcheck + restart policy.

[build]
builder = "DOCKERFILE"

[deploy]
healthcheckPath = "/api/version"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
