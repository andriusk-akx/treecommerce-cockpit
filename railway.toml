# Railway deployment config — Dockerfile-driven build & start.
#
# Build/start commands live in the Dockerfile so the same image works
# locally (`docker build && docker run`) and on Railway. railway.toml
# only configures healthcheck + restart policy.

[build]
builder = "DOCKERFILE"

[deploy]
# Healthcheck disabled — Railway was killing the container during cold-start
# windows where /api/version was momentarily slow. Without a healthcheck,
# Railway only restarts on actual process exit.
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
