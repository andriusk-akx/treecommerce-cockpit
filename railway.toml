# Railway deployment config
# https://docs.railway.app/reference/config-as-code
#
# Two phases:
#   1. Build  — generate version.ts, prisma client, run next build
#   2. Deploy — apply migrations, then start Next.js
#
# Healthcheck hits /api/version which is a force-static endpoint that
# requires no DB or Zabbix — perfect for liveness checks.

[build]
builder = "NIXPACKS"
buildCommand = "npm ci --include=dev && npx prisma generate && npm run version:generate && npm run build"

[deploy]
# Apply pending migrations on every deploy. Idempotent — already-applied
# migrations are skipped. Then start Next.js in production mode.
startCommand = "npx prisma migrate deploy && npx next start -p ${PORT:-3000}"
healthcheckPath = "/api/version"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
# Send commit/branch/build-time into the bundle so /api/version reflects
# what's actually deployed, not the dev machine that pushed last.
[deploy.envs]
NODE_ENV = "production"
