<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AKpilot — Clickable Prototype v6</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        brand: { 50:'#f0f7ff', 100:'#e0effe', 200:'#b9dffe', 300:'#7cc5fd', 400:'#36a9fa', 500:'#0c8feb', 600:'#0070c9', 700:'#0059a3', 800:'#054b86', 900:'#053f6f' },
        surface: { 0:'#ffffff', 1:'#f8f9fb', 2:'#f1f3f5', 3:'#e9ecef' },
        ink: { 0:'#212529', 1:'#495057', 2:'#868e96', 3:'#adb5bd' },
        ok: '#12b886', warn: '#f59f00', danger: '#fa5252',
      }
    }
  }
}
</script>
<style>
  * { box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 0; background: #f8f9fb; color: #212529; }
  .tab-active { color: #0070c9; border-bottom: 2px solid #0070c9; font-weight: 500; }
  .tab-inactive { color: #868e96; border-bottom: 2px solid transparent; }
  .tab-inactive:hover { color: #495057; border-bottom-color: #dee2e6; }
  .card { background: #fff; border: 1px solid #e9ecef; border-radius: 8px; }
  .kpi-card { background: #fff; border: 1px solid #e9ecef; border-radius: 8px; padding: 16px 20px; }
  .kpi-val { font-size: 28px; font-weight: 700; line-height: 1.1; }
  .kpi-label { font-size: 12px; color: #868e96; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 4px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .pill { display: inline-flex; align-items: center; padding: 2px 10px; border-radius: 12px; font-size: 12px; font-weight: 500; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 6px; font-size: 14px; font-weight: 500; cursor: pointer; border: none; transition: all .15s; }
  .btn-primary { background: #0070c9; color: #fff; }
  .btn-primary:hover { background: #0059a3; }
  .btn-secondary { background: #fff; color: #495057; border: 1px solid #dee2e6; }
  .btn-secondary:hover { background: #f8f9fb; }
  .table-header { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: #868e96; font-weight: 600; }
  .topnav-item { padding: 10px 16px; font-size: 14px; font-weight: 500; cursor: pointer; border-radius: 6px; transition: all .15s; }
  .topnav-active { background: #0070c9; color: #fff; }
  .topnav-inactive { color: #495057; }
  .topnav-inactive:hover { background: #e9ecef; }
  .sidebar-item { padding: 8px 12px; font-size: 13px; cursor: pointer; border-radius: 6px; transition: all .1s; display: flex; align-items: center; gap: 8px; }
  .sidebar-active { background: #e0effe; color: #0070c9; font-weight: 500; }
  .sidebar-inactive { color: #495057; }
  .sidebar-inactive:hover { background: #f1f3f5; }
  .progress-bar { height: 6px; border-radius: 3px; background: #e9ecef; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 3px; transition: width .3s; }
  .breadcrumb { font-size: 13px; color: #868e96; display: flex; align-items: center; gap: 6px; }
  .breadcrumb a { color: #868e96; text-decoration: none; cursor: pointer; }
  .breadcrumb a:hover { color: #495057; }
  .filter-chip { display: inline-flex; align-items: center; padding: 4px 12px; border-radius: 16px; font-size: 13px; cursor: pointer; border: 1px solid #dee2e6; background: #fff; color: #495057; transition: all .1s; }
  .filter-chip.active { background: #0070c9; color: #fff; border-color: #0070c9; }
  .filter-chip:hover:not(.active) { background: #f1f3f5; }
  .event-row { padding: 12px 16px; border-bottom: 1px solid #f1f3f5; cursor: pointer; transition: background .1s; }
  .event-row:hover { background: #f8f9fb; }
  /* v5: expandable row indicator */
  .expand-icon { display: inline-block; width: 16px; text-align: center; font-size: 10px; color: #868e96; transition: transform .15s; }
  .expand-icon.open { transform: rotate(90deg); }
  .ev-detail, .tx-detail, .promo-detail { overflow: hidden; transition: max-height .2s ease-out, opacity .15s; }
  .ev-detail.hidden, .tx-detail.hidden, .promo-detail.hidden { max-height: 0; opacity: 0; margin: 0; padding: 0; }
  .ev-detail:not(.hidden), .tx-detail:not(.hidden), .promo-detail:not(.hidden) { max-height: 2000px; opacity: 1; }
  .heatmap-cell { width: 32px; height: 24px; border-radius: 3px; display: inline-flex; align-items: center; justify-content: center; font-size: 10px; color: #fff; }
  input, select { font-size: 14px; padding: 8px 12px; border: 1px solid #dee2e6; border-radius: 6px; outline: none; transition: border-color .15s; }
  input:focus, select:focus { border-color: #0070c9; }
  .toast { position: fixed; bottom: 24px; right: 24px; background: #212529; color: #fff; padding: 12px 20px; border-radius: 8px; font-size: 14px; z-index: 200; animation: fadeInUp .3s; }
  @keyframes fadeInUp { from { opacity:0; transform: translateY(12px); } to { opacity:1; transform: translateY(0); } }
  @keyframes pulse-border { 0%,100% { border-color: #f87171; } 50% { border-color: #dc2626; } }
  /* Timeline popups must sit above all card content */
  .tl-popup { position: absolute; z-index: 50; background: #fff; border: 1px solid #e9ecef; border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,.15); padding: 12px; font-size: 12px; width: 320px; }
  .tl-popup::before { content: ''; position: absolute; top: -6px; left: 16px; width: 12px; height: 12px; background: #fff; border-left: 1px solid #e9ecef; border-top: 1px solid #e9ecef; transform: rotate(45deg); }
  /* Unified filter bar */
  .filter-bar { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; padding: 12px 16px; background: #fff; border: 1px solid #e9ecef; border-radius: 8px; margin-bottom: 20px; }
  .filter-bar .filter-group { display: flex; align-items: center; gap: 6px; }
  .filter-bar .filter-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: #868e96; font-weight: 600; white-space: nowrap; }
  .filter-bar .divider { width: 1px; height: 24px; background: #e9ecef; }
  /* v5: calmer spacing and hierarchy */
  .card { transition: box-shadow .15s; }
  h1 { letter-spacing: -0.3px; }
  h3.font-semibold { font-size: 14px; }
  .kpi-card { transition: box-shadow .15s; }
  .kpi-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,.06); }
  /* Collapsible sections */
  .collapse-toggle { cursor: pointer; user-select: none; }
  .collapse-toggle:hover { background: #f8f9fb; border-radius: 6px; }
  /* v5: export selection */
  .exportable { position: relative; }
  .export-cb { position: absolute; top: 10px; right: 10px; width: 18px; height: 18px; accent-color: #0070c9; cursor: pointer; z-index: 20; opacity: 0.4; transition: opacity .15s; }
  .exportable:hover .export-cb, .export-cb:checked { opacity: 1; }
  .export-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #212529; color: #fff; padding: 12px 24px; display: flex; align-items: center; justify-content: center; gap: 16px; z-index: 100; animation: fadeInUp .2s; box-shadow: 0 -4px 20px rgba(0,0,0,.2); }
  .export-bar .btn { font-size: 13px; padding: 6px 16px; }
</style>
</head>
<body>

<div id="app"></div>

<script>
// ============================================================
// STATE
// ============================================================
const state = {
  route: 'home',
  params: {},
  modal: null,
  toastMsg: null,
  toastTimer: null,
  filters: {},
};

function navigate(route, params) {
  params = params || {};
  // Preserve filters when switching tabs within the same pilot
  var samePilot = (route === state.route) && (params.id === state.params.id) && (params.tab !== state.params.tab);
  var sameProduct = (route.indexOf('-pilot') >= 0) && (state.route.indexOf('-pilot') >= 0) && (params.id === state.params.id);
  state.route = route;
  state.params = params;
  state.modal = null;
  if (!samePilot && !sameProduct) { state.filters = {}; }
  // Keep evView and tlLayer as tab-specific (reset on tab change)
  if (samePilot || sameProduct) { delete state.filters.evView; delete state.filters.tlLayer; }
  window.location.hash = route + (params.id ? '/' + params.id : '') + (params.tab ? '/' + params.tab : '');
  render();
  if (!samePilot && !sameProduct) { window.scrollTo(0, 0); }
}

function toast(msg) {
  state.toastMsg = msg;
  render();
  clearTimeout(state.toastTimer);
  state.toastTimer = setTimeout(function() { state.toastMsg = null; render(); }, 2500);
}

// ============================================================
// MOCK DATA
// ============================================================
var tcPilots = [
  { id:'tc-maxima-vln', name:'Maxima Vilnius', client:'Maxima LT', status:'warning', devices:12, online:10, offline:2, activeIssues:3, uptimePct:96.2, lastSync:'2026-04-04 09:12', salesTotal:'\u20AC14,280', salesTrend:'+8%', promoActive:2 },
  { id:'tc-iki-kns', name:'IKI Kaunas', client:'IKI Lietuva', status:'healthy', devices:8, online:8, offline:0, activeIssues:0, uptimePct:99.8, lastSync:'2026-04-04 09:15', salesTotal:'\u20AC9,740', salesTrend:'+3%', promoActive:1 },
  { id:'tc-rimi-klp', name:'Rimi Express Klaip\u0117da', client:'Rimi Baltic', status:'critical', devices:6, online:3, offline:3, activeIssues:5, uptimePct:87.4, lastSync:'2026-04-04 08:55', salesTotal:'\u20AC5,120', salesTrend:'-12%', promoActive:0 },
];

var rtPilots = [
  { id:'rt-rimi-sco', name:'Rimi SCO Investigation', client:'Rimi Baltic', status:'active', hosts:47, cpuClasses:3, highRisk:8, refStore:'Rimi \u017Dirm\u016Bnai #12', lastSync:'2026-04-04 09:10', finding:'CPU bottleneck on Celeron J6412 hosts under peak load' },
  { id:'rt-rimi-p2', name:'Rimi Pilot Store #2', client:'Rimi Baltic', status:'pending', hosts:12, cpuClasses:2, highRisk:2, refStore:'TBD', lastSync:'2026-04-04 07:30', finding:'Awaiting baseline data collection' },
];

var integrations = [
  { id:'int-zabbix', name:'Zabbix Monitoring', type:'Monitoring', product:'Shared', pilots:['tc-maxima-vln','tc-iki-kns','tc-rimi-klp','rt-rimi-sco'], status:'healthy', freshness:'2 min ago', latency:'120ms', endpoint:'monitoring.strongpoint.com', version:'7.4.5' },
  { id:'int-12eat', name:'12eat POS API', type:'POS / Sales', product:'TreeCommerce', pilots:['tc-maxima-vln','tc-iki-kns','tc-rimi-klp'], status:'healthy', freshness:'5 min ago', latency:'340ms', endpoint:'api.12eat.lt', version:'v3.1' },
  { id:'int-retellect', name:'Retellect Metrics', type:'Resource Monitoring', product:'Retellect', pilots:['rt-rimi-sco','rt-rimi-p2'], status:'warning', freshness:'18 min ago', latency:'890ms', endpoint:'metrics.retellect.io', version:'v1.2-beta' },
  { id:'int-inventory', name:'TreeCommerce Inventory', type:'Inventory', product:'TreeCommerce', pilots:['tc-maxima-vln','tc-iki-kns'], status:'degraded', freshness:'47 min ago', latency:'2100ms', endpoint:'inv.treecommerce.lt', version:'v2.0' },
  { id:'int-csv-promo', name:'CSV: Promotion History', type:'CSV Import', product:'TreeCommerce', pilots:['tc-maxima-vln','tc-iki-kns','tc-rimi-klp'], status:'healthy', freshness:'1 day ago', latency:'\u2014', endpoint:'Manual upload + /data/promo/', version:'\u2014', csv:{ mode:'both', filename:'promotions_2026_Q1.csv', rows:1247, lastUpload:'2026-04-03 14:20', schedule:'Daily 06:00 from /data/promo/', nextSync:'2026-04-05 06:00', columns:['promo_id','product_sku','start_date','end_date','discount_pct','coupon_code','type'] } },
  { id:'int-csv-baseline', name:'CSV: Sales Baseline', type:'CSV Import', product:'TreeCommerce', pilots:['tc-maxima-vln'], status:'healthy', freshness:'3 days ago', latency:'\u2014', endpoint:'Manual upload', version:'\u2014', csv:{ mode:'upload', filename:'maxima_vln_baseline_mar2026.csv', rows:8420, lastUpload:'2026-04-01 10:05', schedule:null, nextSync:null, columns:['date','store','terminal_id','receipt_id','product_sku','qty','amount','hour'] } },
];

var users = [
  { name:'Andrius K.', email:'andrius.k@gmail.com', role:'Owner', access:'All products', lastActive:'Today 09:15' },
  { name:'Jonas P.', email:'jonas@strongpoint.com', role:'Internal', access:'TreeCommerce', lastActive:'Yesterday' },
  { name:'Rimi IT Team', email:'it-sco@rimi.lt', role:'External viewer', access:'Retellect > Rimi SCO', lastActive:'2 days ago' },
];

function statusBadge(s) {
  var map = {
    healthy: ['bg-emerald-50 text-emerald-700','\u25CF Healthy'],
    active: ['bg-emerald-50 text-emerald-700','\u25CF Active'],
    warning: ['bg-amber-50 text-amber-700','\u25CF Warning'],
    critical: ['bg-red-50 text-red-700','\u25CF Critical'],
    degraded: ['bg-orange-50 text-orange-700','\u25CF Degraded'],
    pending: ['bg-gray-100 text-gray-500','\u25CB Pending'],
    offline: ['bg-red-50 text-red-700','\u25CF Offline'],
  };
  var entry = map[s] || ['bg-gray-100 text-gray-500', s];
  return '<span class="pill ' + entry[0] + '">' + entry[1] + '</span>';
}

// Reusable period selector with custom option
function periodSelector(active) {
  active = active || '7d';
  var periods = ['1h','1d','7d','14d','30d','90d'];
  var html = '<div class="flex items-center gap-1">';
  for (var i = 0; i < periods.length; i++) {
    html += '<span class="filter-chip ' + (periods[i] === active ? 'active' : '') + '">' + periods[i] + '</span>';
  }
  html += '<span class="filter-chip" style="gap:4px"><span style="font-size:11px">\u2630</span> Custom</span>';
  html += '</div>';
  return html;
}

// Unified store dropdown (scales to dozens of stores)
function storeDropdown(stores) {
  stores = stores || ['Maxima Vilnius C1','Maxima Vilnius C2','Maxima Kaunas A1','Maxima Klaip\u0117da M3'];
  var opts = '<option value="all">All stores</option>';
  for (var i = 0; i < stores.length; i++) {
    opts += '<option>' + stores[i] + '</option>';
  }
  return '<select class="text-sm" style="min-width:180px">' + opts + '</select>';
}

// Device type chips
function deviceTypeChips() {
  return '<span class="filter-chip active">All types</span>' +
    '<span class="filter-chip">SCO</span><span class="filter-chip">POS</span><span class="filter-chip">Server</span>';
}

// Unified filter bar: combines store + period + optional extras into one consistent bar
function filterBar(opts) {
  opts = opts || {};
  var html = '<div class="filter-bar">';
  // Store filter (always present when relevant)
  if (opts.store !== false) {
    html += '<div class="filter-group"><span class="filter-label">Store</span>' + storeDropdown(opts.stores) + '</div>';
    html += '<div class="divider"></div>';
  }
  // Device type filter
  if (opts.deviceType) {
    html += '<div class="filter-group"><span class="filter-label">Type</span>' + deviceTypeChips() + '</div>';
    html += '<div class="divider"></div>';
  }
  // Period filter (almost always present)
  if (opts.period !== false) {
    html += '<div class="filter-group"><span class="filter-label">Period</span>' + periodSelector(opts.periodDefault || '1d') + '</div>';
  }
  // Search
  if (opts.search) {
    html += '<div class="divider"></div>';
    html += '<input type="text" placeholder="' + (opts.searchPlaceholder || 'Search...') + '" class="text-sm" style="min-width:160px" />';
  }
  // Extra slot
  if (opts.extra) {
    html += '<div class="divider"></div>' + opts.extra;
  }
  html += '</div>';
  return html;
}

// v5: exportable chart wrapper — wraps a card's inner HTML, adds checkbox
function exportableCard(id, label, innerHtml) {
  return '<div class="card exportable" data-export-id="' + id + '" data-export-label="' + label + '">' +
    '<input type="checkbox" class="export-cb" data-export-check="' + id + '" title="Select for export" onclick="event.stopPropagation();updateExportBar()" />' +
    innerHtml +
  '</div>';
}

function updateExportBar() {
  var bar = document.getElementById('export-bar');
  var checks = document.querySelectorAll('.export-cb:checked');
  if (checks.length > 0) {
    // Gather current context from period bar
    var periodCtx = state.filters.period || '7d';
    var storeCtx = 'All stores';
    var ctxEls = document.querySelectorAll('.filter-bar select');
    for (var ci = 0; ci < ctxEls.length; ci++) { if (ctxEls[ci].options && ctxEls[ci].selectedIndex >= 0) { var sv = ctxEls[ci].options[ctxEls[ci].selectedIndex].text; if (sv.indexOf('pardu') >= 0 || sv.indexOf('store') >= 0 || sv.indexOf('All') >= 0 || sv.indexOf('Maxima') >= 0 || sv.indexOf('Rimi') >= 0 || sv.indexOf('IKI') >= 0) storeCtx = sv; } }
    bar.innerHTML = '<span class="text-sm">' + checks.length + ' chart' + (checks.length > 1 ? 's' : '') + ' selected</span>' +
      '<span class="text-xs" style="color:#adb5bd">Period: ' + periodCtx + ' | Store: ' + storeCtx + '</span>' +
      '<button class="btn btn-primary" onclick="doExport(\'pptx\')">Export \u2192 PPT</button>' +
      '<button class="btn" style="background:#fff;color:#212529" onclick="doExport(\'pdf\')">Export \u2192 PDF</button>' +
      '<button class="btn" style="color:#adb5bd;background:transparent" onclick="clearExportSelection()">Cancel</button>';
    bar.style.display = 'flex';
  } else {
    bar.style.display = 'none';
  }
}

function clearExportSelection() {
  var checks = document.querySelectorAll('.export-cb:checked');
  for (var i = 0; i < checks.length; i++) checks[i].checked = false;
  updateExportBar();
}

function doExport(fmt) {
  var checks = document.querySelectorAll('.export-cb:checked');
  var labels = [];
  for (var i = 0; i < checks.length; i++) {
    var card = checks[i].closest('.exportable');
    if (card) labels.push(card.getAttribute('data-export-label'));
  }
  toast('Exporting ' + labels.length + ' chart' + (labels.length > 1 ? 's' : '') + ' \u2192 ' + fmt.toUpperCase() + '...');
  clearExportSelection();
}

// ============================================================
// RENDER ENGINE
// ============================================================
function render() {
  var app = document.getElementById('app');
  app.innerHTML = shell(routeContent());
  bindClicks();
}

function shell(content) {
  return '<div class="min-h-screen flex flex-col">' +
    topNav() +
    '<main class="flex-1">' + content + '</main>' +
    '<div id="export-bar" class="export-bar" style="display:none"></div>' +
    (state.toastMsg ? '<div class="toast">' + state.toastMsg + '</div>' : '') +
  '</div>';
}

// ============================================================
// TOP NAVIGATION
// ============================================================
function topNav() {
  var items = [
    { route:'home', label:'Home' },
    { route:'tc-hub', label:'TreeCommerce' },
    { route:'rt-hub', label:'Retellect' },
    { route:'integrations', label:'Integrations' },
    { route:'settings', label:'Settings' },
  ];
  function isActive(r) {
    if (r === 'home') return state.route === 'home';
    if (r === 'tc-hub') return state.route.indexOf('tc-') === 0;
    if (r === 'rt-hub') return state.route.indexOf('rt-') === 0;
    return state.route.indexOf(r) === 0;
  }
  var navItems = '';
  for (var i = 0; i < items.length; i++) {
    var it = items[i];
    navItems += '<div class="topnav-item ' + (isActive(it.route) ? 'topnav-active' : 'topnav-inactive') + '" data-nav="' + it.route + '">' + it.label + '</div>';
  }
  return '<header class="bg-white border-b border-surface-3 px-6 py-0 flex items-center justify-between" style="height:52px">' +
    '<div class="flex items-center gap-1">' +
      '<span class="font-bold text-lg mr-6 tracking-tight" style="color:#0070c9">AK<span style="color:#212529">pilot</span></span>' +
      navItems +
    '</div>' +
    '<div class="flex items-center gap-3">' +
      '<span class="text-xs text-ink-2">v6 prototype</span>' +
      '<div class="w-8 h-8 rounded-full bg-brand-100 flex items-center justify-center text-brand-700 text-sm font-semibold">AK</div>' +
    '</div>' +
  '</header>';
}

// ============================================================
// ROUTER
// ============================================================
function routeContent() {
  var r = state.route;
  if (r === 'home') return homePage();
  if (r === 'tc-hub') return tcHubPage();
  if (r === 'tc-pilot') return tcPilotWorkspace();
  if (r === 'rt-hub') return rtHubPage();
  if (r === 'rt-pilot') return rtPilotWorkspace();
  if (r === 'integrations') return integrationsPage();
  if (r === 'settings') return settingsPage();
  if (r === 'new-pilot') return newPilotFlow();
  return homePage();
}

// ============================================================
// HOME
// ============================================================
function homePage() {
  var tcSummary = '';
  for (var i = 0; i < tcPilots.length; i++) {
    var p = tcPilots[i];
    tcSummary += '<div class="flex items-center justify-between py-3 border-b border-surface-2 last:border-0 cursor-pointer hover:bg-surface-1 -mx-5 px-5 transition" data-nav="tc-pilot" data-id="' + p.id + '">' +
      '<div><span class="font-medium text-sm">' + p.name + '</span><span class="text-xs text-ink-2 ml-2">' + p.client + '</span></div>' +
      '<div class="flex items-center gap-3">' + statusBadge(p.status) + '<span class="text-xs text-ink-2">' + p.online + '/' + p.devices + ' online</span></div>' +
    '</div>';
  }
  var rtSummary = '';
  for (var i = 0; i < rtPilots.length; i++) {
    var p = rtPilots[i];
    rtSummary += '<div class="flex items-center justify-between py-3 border-b border-surface-2 last:border-0 cursor-pointer hover:bg-surface-1 -mx-5 px-5 transition" data-nav="rt-pilot" data-id="' + p.id + '">' +
      '<div><span class="font-medium text-sm">' + p.name + '</span><span class="text-xs text-ink-2 ml-2">' + p.client + '</span></div>' +
      '<div class="flex items-center gap-3">' + statusBadge(p.status) + '<span class="text-xs text-ink-2">' + p.hosts + ' hosts</span></div>' +
    '</div>';
  }

  return '<div class="max-w-6xl mx-auto px-6 py-8">' +
    '<div class="mb-8"><h1 class="text-2xl font-bold mb-1">Operations Overview</h1>' +
    '<p class="text-ink-2 text-sm">Pilot status across all products</p></div>' +

    '<div class="grid grid-cols-3 gap-4 mb-8">' +
      '<div class="kpi-card"><div class="kpi-val">5</div><div class="kpi-label">Active Pilots</div></div>' +
      '<div class="kpi-card"><div class="kpi-val text-emerald-600">21 / 26</div><div class="kpi-label">Devices Online</div></div>' +
      '<div class="kpi-card"><div class="kpi-val text-red-600">3</div><div class="kpi-label">Needs Attention</div></div>' +

    {name:'silver', store:'Maxima Vilnius C1', type:'SCO', ip:'192.168.1.102', status:'online', cpu:'31%', ram:'52%', lastEvent:'Normal operation', lastSeen:'09:15'},
    {name:'SEB', store:'Maxima Vilnius C1', type:'POS', ip:'192.168.1.103', status:'online', cpu:'18%', ram:'38%', lastEvent:'Normal operation', lastSeen:'09:14'},
    {name:'SP', store:'Maxima Vilnius C1', type:'POS', ip:'192.168.1.104', status:'offline', cpu:'\u2014', ram:'\u2014', lastEvent:'No response', lastSeen:'07:22', dur:'1h 53min'},
    {name:'POS_54', store:'Maxima Vilnius C2', type:'POS', ip:'192.168.1.105', status:'online', cpu:'27%', ram:'41%', lastEvent:'Normal operation', lastSeen:'09:15'},
    {name:'SCO_47', store:'Maxima Vilnius C2', type:'SCO', ip:'192.168.1.106', status:'online', cpu:'45%', ram:'67%', lastEvent:'High CPU warning', lastSeen:'09:15'},
    {name:'Azure_Demo_Silver', store:'Maxima Vilnius C2', type:'SCO', ip:'192.168.1.107', status:'offline', cpu:'\u2014', ram:'\u2014', lastEvent:'Connection lost', lastSeen:'08:45', dur:'0h 30min'},
    {name:'TREECOM', store:'\u2014', type:'Server', ip:'192.168.1.10', status:'online', cpu:'12%', ram:'34%', lastEvent:'Normal operation', lastSeen:'09:15'},
  ];
  var onCount = 0, offCount = 0;
  for (var i = 0; i < devices.length; i++) { if (devices[i].status === 'online') onCount++; else offCount++; }
  // Sort: offline first, then warnings, then normal

    var aPri = a.status === 'offline' ? 0 : (parseInt(a.cpu) > 40 ? 1 : 2);

  });

  var rows = '';

    var d = devices[i];
    var cpuNum = parseInt(d.cpu);
    var typePill = d.type === 'SCO' ? 'bg-brand-50 text-brand-700' : d.type === 'POS' ? 'bg-amber-50 text-amber-700' : 'bg-surface-2 text-ink-1';

      '</span></td>' +
      '<td class="py-3 px-4 ' + (cpuNum > 40 ? 'text-amber-600 font-medium' : '') + '">' + d.cpu + '</td>' +
      '<td class="py-3 px-4">' + d.ram + '</td>' +
      '<td class="py-3 px-4 text-ink-2 text-xs">' + d.lastEvent + '</td>' +
      '<td class="py-3 px-4 text-ink-2">' + d.lastSeen + '</td>' +
    '</tr>';
  }

  return filterBar({store: true, deviceType: true, period: false, stores: ['Maxima Vilnius C1','Maxima Vilnius C2']}) +
  '<div class="grid grid-cols-3 gap-4 mb-6">' +
    '<div class="kpi-card"><div class="kpi-val text-emerald-600">' + onCount + '</div><div class="kpi-label">Online</div></div>' +
    '<div class="kpi-card"><div class="kpi-val text-red-600">' + offCount + '</div><div class="kpi-label">Offline</div></div>' +
    '<div class="kpi-card"><div class="kpi-val text-amber-600">1</div><div class="kpi-label">Warnings</div></div>' +
  '</div>' +
  '<div class="card overflow-hidden"><table class="w-full text-sm">' +
    '<thead><tr class="bg-surface-1">' +
      '<th class="table-header text-left py-3 px-4">Device (Zabbix)</th>' +
      '<th class="table-header text-left py-3 px-4">Type</th>' +
      '<th class="table-header text-left py-3 px-4">Store</th>' +
      '<th class="table-header text-left py-3 px-4">Status</th>' +
      '<th class="table-header text-left py-3 px-4">CPU</th>' +
      '<th class="table-header text-left py-3 px-4">RAM</th>' +
      '<th class="table-header text-left py-3 px-4">Last Event</th>' +

  '<div class="mt-3 text-xs text-ink-2">Device names shown as received from Zabbix. Map to POS/SCO numbers and link to 12eat terminal IDs in <span class="text-brand-600 cursor-pointer hover:underline" data-nav="settings" data-tab="tc-defaults">Settings \u2192 TreeCommerce Defaults \u2192 Device Mapping</span>.</div>';
}

        '</div>' +
      '</div>' +
      '<div class="p-4 bg-surface-1 rounded">' +
        '<h4 class="font-semibold mb-2">5. Without Profitability Data (our case)</h4>' +

          '<div>\u2022 Focus on <strong>volume metrics</strong>: units sold, receipt count, basket size, visit frequency.</div>' +
          '<div>\u2022 Use <strong>revenue share</strong> as proxy: promoted product revenue as % of total store revenue.</div>' +
          '<div>\u2022 Track <strong>displacement</strong>: did total store revenue increase, or did promo just shift spend within store?</div>' +
          '<div>\u2022 <strong>Efficiency proxy:</strong> Incremental receipts per promo (how many extra visits did the promotion drive?).</div>' +
          '<div>\u2022 Flag promotions where unit sales rise but total category revenue stays flat \u2192 price sensitivity, not growth.</div>' +

      '</div>' +
      '<div class="p-4 bg-amber-50 rounded border border-amber-200">' +
        '<h4 class="font-semibold mb-2 text-amber-800">Key limitation reminder</h4>' +

      '</div>' +
    '</div>' +
  '</div>' +
  '';
}

// Pill renderers shared across Inventory + Data Health
function agentPill(state) {
  var map = {
    healthy:    {cls:'bg-emerald-50 text-emerald-700', dot:'bg-emerald-500', label:'Healthy'},
    partial:    {cls:'bg-amber-50 text-amber-700',     dot:'bg-amber-500',   label:'Partial'},
    broken:     {cls:'bg-red-50 text-red-700',         dot:'bg-red-500',     label:'Broken'},
    unenrolled: {cls:'bg-surface-2 text-ink-2',         dot:'bg-ink-3',       label:'Unenrolled'}
  };
  var m = map[state] || map.unenrolled;
  return '<span class="pill ' + m.cls + ' text-xs"><span class="status-dot ' + m.dot + '" style="margin-right:4px"></span>' + m.label + '</span>';
}
function rtPill(state) {
  var map = {
    on:      {cls:'bg-emerald-50 text-emerald-700', label:'On'},
    off:     {cls:'bg-surface-2 text-ink-2',         label:'Off'},
    unknown: {cls:'bg-surface-2 text-ink-3',         label:'Unknown'}
  };
  var m = map[state] || map.unknown;
  return '<span class="pill ' + m.cls + ' text-xs">' + m.label + '</span>';
}

// ============================================================
// MON-1: Data Health view
// Distinguishes "Zabbix agent broken" from "Retellect not running".
// Surfaces same-store sibling contrast (e.g. T822 SCO1 healthy + SCO2 broken).
// ============================================================
function rtDataHealth(p) {
  var hosts = rtHosts();

  // Bucket counts
  var counts = {healthy:0, partial:0, broken:0, unenrolled:0};
  for (var i = 0; i < hosts.length; i++) counts[hosts[i].agent]++;

  // Group hosts by store for sibling contrast
  var byStore = {};
  var storeOrder = [];
  for (var i = 0; i < hosts.length; i++) {
    var s = hosts[i].store;
    if (!byStore[s]) { byStore[s] = []; storeOrder.push(s); }
    byStore[s].push(hosts[i]);
  }

  function diagnosis(h) {
    if (h.agent === 'broken') {
      return 'Most items report <code>ZBX_NOTSUPPORTED</code>. Likely host-side: Zabbix agent missing Performance Monitor Users group, corrupt PDH counters (try <code>lodctr /R</code>), or stuck WMI provider. Same-store siblings may still be healthy — this is host-level, not store-level.';
    }
    if (h.agent === 'partial') {
      return 'A subset of items unsupported. Per-process CPU may be incomplete. Verify perf_counter keys and sampling interval with SP Zabbix admin.';
    }
    if (h.agent === 'unenrolled') {
      return 'Host is not registered in Zabbix at all. Either out of pilot scope or pending onboarding.';
    }
    return 'Agent reporting normally. All ' + h.itemsTotal + ' items in <code>state=0</code>.';
  }

  function actionLink(h) {
    if (h.agent === 'broken') return '<button class="btn btn-secondary text-xs" onclick="toast(\'Drafting agent fix runbook for ' + h.host + '...\')">Open runbook →</button>';
    if (h.agent === 'partial') return '<button class="btn btn-secondary text-xs" onclick="toast(\'Listing unsupported items for ' + h.host + '...\')">Show unsupported items →</button>';
    if (h.agent === 'unenrolled') return '<button class="btn btn-secondary text-xs" onclick="toast(\'Enrollment workflow not yet wired\')">Enroll host →</button>';
    return '<span class="text-xs text-ink-3">No action needed</span>';
  }

  var groups = '';
  for (var si = 0; si < storeOrder.length; si++) {
    var store = storeOrder[si];
    var siblings = byStore[store];
    var hasHealthy = false, hasIssue = false;
    for (var j = 0; j < siblings.length; j++) {
      if (siblings[j].agent === 'healthy') hasHealthy = true;
      if (siblings[j].agent === 'broken' || siblings[j].agent === 'partial') hasIssue = true;
    }
    var contrastBadge = (hasHealthy && hasIssue) ?
      '<span class="pill bg-amber-50 text-amber-700 text-xs">Mixed — host-level issue</span>' : '';

    var siblingRows = '';
    for (var j = 0; j < siblings.length; j++) {
      var h = siblings[j];
      siblingRows +=
        '<tr class="border-t border-surface-2">' +
          '<td class="py-3 px-3 font-mono text-xs">' + h.host + '</td>' +
          '<td class="py-3 px-3 text-center">' + agentPill(h.agent) + '</td>' +
          '<td class="py-3 px-3 text-center">' + rtPill(h.rt) + '</td>' +
          '<td class="py-3 px-3 text-center text-xs">' + (h.itemsTotal > 0 ? '<span class="font-medium ' + (h.itemsOk < h.itemsTotal ? 'text-amber-600' : 'text-emerald-600') + '">' + h.itemsOk + '/' + h.itemsTotal + '</span>' : '<span class="text-ink-3">—</span>') + '</td>' +
          '<td class="py-3 px-3 text-xs text-ink-2">' + h.lastUpdate + '</td>' +
          '<td class="py-3 px-3 text-xs">' + diagnosis(h) + '</td>' +
          '<td class="py-3 px-3 text-right">' + actionLink(h) + '</td>' +
        '</tr>';
    }

    groups +=
      '<div class="card overflow-hidden mb-4">' +
        '<div class="p-4 bg-surface-1 border-b border-surface-2 flex items-center justify-between">' +
          '<div class="flex items-center gap-3"><span class="font-semibold">' + store + '</span><span class="text-xs text-ink-2">' + siblings.length + ' host' + (siblings.length === 1 ? '' : 's') + '</span></div>' +
          contrastBadge +
        '</div>' +
        '<table class="w-full text-sm">' +
          '<thead><tr class="bg-white"><th class="table-header text-left py-2 px-3">Host</th><th class="table-header text-center py-2 px-3">Agent</th><th class="table-header text-center py-2 px-3">Retellect</th><th class="table-header text-center py-2 px-3">Items OK</th><th class="table-header text-left py-2 px-3">Last update</th><th class="table-header text-left py-2 px-3">Diagnosis</th><th class="table-header text-right py-2 px-3">Action</th></tr></thead>' +
          '<tbody>' + siblingRows + '</tbody>' +
        '</table>' +
      '</div>';
  }

  return '<div class="card p-5 mb-5 border-l-4 border-l-amber-400">' +
    '<h3 class="font-semibold mb-2">Why this view exists</h3>' +
    '<p class="text-sm text-ink-1">A host with no CPU data is <em>not</em> the same as a host where Retellect is off. Some Rimi SCOs have local Zabbix agents in a degraded state where most <code>perf_counter[*]</code> items report <code>ZBX_NOTSUPPORTED</code>. The dashboard would otherwise read those as 0&nbsp;% Retellect activity — a false negative. This view surfaces monitoring gaps separately so they don\'t pollute capacity findings.</p>' +
  '</div>' +

  '<div class="grid grid-cols-4 gap-4 mb-6">' +
    '<div class="kpi-card"><div class="kpi-val text-emerald-600">' + counts.healthy + '</div><div class="kpi-label">Healthy</div></div>' +
    '<div class="kpi-card"><div class="kpi-val text-amber-600">' + counts.partial + '</div><div class="kpi-label">Partial</div></div>' +
    '<div class="kpi-card"><div class="kpi-val text-red-600">' + counts.broken + '</div><div class="kpi-label">Broken</div></div>' +
    '<div class="kpi-card"><div class="kpi-val text-ink-3">' + counts.unenrolled + '</div><div class="kpi-label">Unenrolled</div></div>' +
  '</div>' +

  '<div class="flex items-center justify-between mb-3">' +
    '<h3 class="font-semibold">Per-store breakdown</h3>' +

function integrationsPage() {
  var prodFilter = state.filters.product || 'all';
  var statusF = state.filters.intStatus || 'all';
  var filtered = [];
  for (var i = 0; i < integrations.length; i++) {
    var int = integrations[i];
    if (prodFilter !== 'all' && int.product !== prodFilter && int.product !== 'Shared') continue;
    if (statusF !== 'all' && int.status !== statusF) continue;
    filtered.push(int);
  }

  var prodChips = '';
  var prodLabels = ['all','TreeCommerce','Retellect','Shared'];
  for (var i = 0; i < prodLabels.length; i++) {
    var f = prodLabels[i];
    prodChips += '<span class="filter-chip ' + (prodFilter === f ? 'active' : '') + '" data-filter-product="' + f + '">' + (f === 'all' ? 'All' : f) + '</span>';
  }
  var statChips = '';
  var statLabels = ['all','healthy','warning','degraded'];
  for (var i = 0; i < statLabels.length; i++) {
    var f = statLabels[i];
    statChips += '<span class="filter-chip ' + (statusF === f ? 'active' : '') + '" data-filter-int-status="' + f + '">' + (f === 'all' ? 'All' : f.charAt(0).toUpperCase() + f.slice(1)) + '</span>';
  }

  var cards = '';
  for (var i = 0; i < filtered.length; i++) {
    var s = filtered[i];
    var pilotNames = [];
    for (var j = 0; j < s.pilots.length; j++) {
      var pid = s.pilots[j];
      var found = null;
      for (var k = 0; k < tcPilots.length; k++) { if (tcPilots[k].id === pid) found = tcPilots[k]; }
      if (!found) for (var k = 0; k < rtPilots.length; k++) { if (rtPilots[k].id === pid) found = rtPilots[k]; }
      pilotNames.push(found ? found.name : pid);
    }
    var pilotTags = '';
    for (var j = 0; j < pilotNames.length; j++) {
      pilotTags += '<span class="text-xs bg-surface-2 px-2 py-0.5 rounded">' + pilotNames[j] + '</span>';
    }
    var icon = s.type === 'Monitoring' ? '\uD83D\uDCE1' : s.type.indexOf('POS') >= 0 ? '\uD83C\uDFEA' : s.type === 'Inventory' ? '\uD83D\uDCE6' : s.type === 'CSV Import' ? '\uD83D\uDCC4' : '\uD83D\uDCCA';
    var isCSV = !!s.csv;

    // CSV-specific extra section
    var csvExtra = '';
    if (isCSV) {
      var c = s.csv;
      var modeBadge = c.mode === 'both' ? '<span class="pill bg-brand-50 text-brand-700">Upload + Auto</span>' : c.mode === 'upload' ? '<span class="pill bg-surface-2 text-ink-1">Manual upload</span>' : '<span class="pill bg-emerald-50 text-emerald-700">Auto-sync</span>';
      csvExtra = '<div class="mt-3 pt-3 border-t border-surface-2">' +
        '<div class="flex items-center gap-3 mb-2">' + modeBadge +
          '<span class="text-xs text-ink-2">File: <span class="font-mono font-medium text-ink-1">' + c.filename + '</span></span>' +
          '<span class="text-xs text-ink-2">' + c.rows.toLocaleString() + ' rows</span>' +
          '<span class="text-xs text-ink-3">Uploaded: ' + c.lastUpload + '</span>' +
        '</div>' +
        '<div class="flex items-center gap-2 flex-wrap">' +
          (function() { if (!c.columns) return ''; var colHtml = ''; for (var ci = 0; ci < c.columns.length; ci++) { colHtml += '<span class="text-xs font-mono bg-surface-2 px-1.5 py-0.5 rounded">' + c.columns[ci] + '</span>'; } return colHtml; })() +
        '</div>' +
        (c.schedule ? '<div class="mt-2 flex items-center gap-2 text-xs"><span class="text-ink-2">\u23F0 Auto:</span><span class="text-ink-1">' + c.schedule + '</span><span class="text-ink-3">\u2014 Next: ' + c.nextSync + '</span></div>' : '') +
        '<div class="mt-2 flex items-center gap-2">' +
          '<button class="btn btn-secondary text-xs" onclick="event.stopPropagation();toast(\'File picker \u2014 coming in implementation\')"><span style="font-size:12px">\u2B06</span> Upload new CSV</button>' +
          '<button class="btn btn-secondary text-xs" onclick="event.stopPropagation();toast(\'Column mapping UI \u2014 coming in implementation\')">Map columns</button>' +
          (c.schedule ? '<button class="btn btn-secondary text-xs" onclick="event.stopPropagation();toast(\'Schedule editor \u2014 coming in implementation\')">\u23F0 Edit schedule</button>' : '') +
        '</div>' +
      '</div>';
    }

    cards += '<div class="card p-5' + (isCSV ? ' border-l-4 border-l-brand-300' : '') + '"><div class="flex items-start justify-between">' +
      '<div class="flex items-start gap-4">' +
        '<div class="w-12 h-12 rounded-lg ' + (isCSV ? 'bg-brand-50' : 'bg-surface-1') + ' flex items-center justify-center text-xl">' + icon + '</div>' +
        '<div><div class="flex items-center gap-3 mb-1"><span class="font-semibold">' + s.name + '</span>' + statusBadge(s.status) + '<span class="pill bg-surface-2 text-ink-1">' + s.product + '</span></div>' +
          '<div class="text-xs text-ink-2 mb-2">' + s.type + ' \u2014 ' + s.endpoint + (s.version !== '\u2014' ? ' \u2014 ' + s.version : '') + '</div>' +
          '<div class="flex items-center gap-2 flex-wrap">' + pilotTags + '</div>' +
          csvExtra +
        '</div>' +
      '</div>' +
      '<div class="flex items-center gap-6 text-sm shrink-0 ml-6">' +
        (isCSV ? '<div class="text-center"><div class="font-medium">' + s.csv.rows.toLocaleString() + '</div><div class="text-xs text-ink-2">Rows</div></div>' :
        '<div class="text-center"><div class="font-medium ' + (parseInt(s.latency) > 500 ? 'text-amber-600' : '') + '">' + s.latency + '</div><div class="text-xs text-ink-2">Latency</div></div>') +
        '<div class="text-center"><div class="font-medium">' + s.freshness + '</div><div class="text-xs text-ink-2">Last Sync</div></div>' +
        '<button class="btn btn-secondary text-xs" onclick="toast(\'' + (isCSV ? 'Re-import triggered' : 'Sync triggered') + '\')">' + (isCSV ? 'Re-import' : 'Sync') + '</button>' +
      '</div>' +
    '</div></div>';
  }

  return '<div class="max-w-6xl mx-auto px-6 py-8">' +
    '<div class="flex items-center justify-between mb-6">' +
      '<div><div class="breadcrumb mb-1"><a data-nav="home">Home</a> <span>/</span> Integrations</div><h1 class="text-2xl font-bold">Integrations</h1></div>' +
      '<div class="flex items-center gap-2"><button class="btn btn-secondary" onclick="toast(\'CSV upload flow \u2014 coming in implementation phase\')">\uD83D\uDCC4 Import CSV</button>' +
      '<button class="btn btn-primary" onclick="toast(\'Add integration flow \u2014 coming in implementation phase\')">+ Add Integration</button></div>' +
    '</div>' +
    // Health summary bar
    (function() {
      var hc = 0, wc = 0, dc = 0;
      for (var i = 0; i < integrations.length; i++) {
        if (integrations[i].status === 'healthy') hc++;

        '<div class="kpi-card"><div class="kpi-val text-emerald-600">' + hc + '</div><div class="kpi-label">Healthy</div></div>' +
        '<div class="kpi-card"><div class="kpi-val text-amber-600">' + wc + '</div><div class="kpi-label">Warning</div></div>' +
        '<div class="kpi-card"><div class="kpi-val text-red-600">' + dc + '</div><div class="kpi-label">Degraded</div></div>' +
      '</div>';
    })() +
    '<div class="flex items-center gap-2 mb-6">' +
      '<span class="text-sm text-ink-2 mr-2">Product:</span>' + prodChips +
      '<span class="text-sm text-ink-2 ml-4 mr-2">Status:</span>' + statChips +
    '</div>' +
    '<div class="grid grid-cols-1 gap-4">' + cards + '</div>' +
  '</div>';
}

function newPilotFlow() {
  var step = state.params.tab || '1';

  var stepIndicator = '';
  for (var i = 0; i < stepLabels.length; i++) {

    var done = parseInt(step) > i+1;
    stepIndicator += '<div class="flex items-center gap-2">' +
      '<div class="w-7 h-7 rounded-full flex items-center justify-center text-xs font-semibold ' + (active ? 'bg-brand-500 text-white' : done ? 'bg-emerald-500 text-white' : 'bg-surface-3 text-ink-2') + '">' + (done ? '\u2713' : (i+1)) + '</div>' +

        // POS override explanation
        '<div class="p-3 bg-blue-50 rounded text-xs text-blue-700">' +
          '<strong>POS override</strong> \u2014 when checked, actual business hours will be auto-detected from POS transaction data, replacing the manually set times. ' +
          'Manual hours serve as initial values until enough transaction data is collected (min. 7 days). ' +
          'If a store has multiple POS terminals, transaction times from all terminals are aggregated to determine open/close times.' +
        '</div>' +
      '</div>' +

      // KPI — inherits from product template
      '<div class="p-3 bg-surface-1 rounded text-sm text-ink-2">' +
        '<div class="flex items-center gap-2"><span class="font-medium">KPI Targets</span><span class="pill bg-surface-2 text-ink-2 text-xs">Product template defaults</span></div>' +
        '<div class="text-xs text-ink-3 mt-1">Inherited from product template. Override per pilot or per store after creation in Pilot Settings.</div>' +
      '</div>' +

      '<div class="flex justify-between pt-2"><button class="btn btn-secondary" data-nav="new-pilot" data-tab="1">\u2190 Back</button><button class="btn btn-primary" data-nav="new-pilot" data-tab="3">Next \u2192</button></div></div>';
  } else if (step === '3') {
    var sources = '';
    for (var i = 0; i < integrations.length; i++) {
      var int = integrations[i];
      sources += '<label class="flex items-center gap-3 p-3 border border-surface-3 rounded-lg cursor-pointer hover:bg-surface-1">' +
        '<input type="checkbox" ' + (int.status === 'healthy' ? 'checked' : '') + ' />' +
        '<div class="flex-1"><span class="text-sm font-medium">' + int.name + '</span><span class="text-xs text-ink-2 ml-2">' + int.type + '</span></div>' +
        statusBadge(int.status) + '</label>';
    }
    body = '<h2 class="font-semibold mb-4">Step 3: Data Sources</h2>' +
      '<p class="text-sm text-ink-2 mb-4">Attach data sources to this pilot. You can add more later.</p>' +
      '<div class="space-y-3 mb-4">' + sources + '</div>' +
      '<div class="flex justify-between pt-2"><button class="btn btn-secondary" data-nav="new-pilot" data-tab="2">\u2190 Back</button><button class="btn btn-primary" data-nav="new-pilot" data-tab="4">Next \u2192</button></div>';
  } else {
    body = '<h2 class="font-semibold mb-4">Step 4: Review & Create</h2>' +
      '<div class="space-y-3 text-sm mb-6">' +
        '<div class="flex justify-between p-3 bg-surface-1 rounded"><span class="text-ink-2">Product:</span><span class="font-medium">TreeCommerce</span></div>' +
        '<div class="flex justify-between p-3 bg-surface-1 rounded"><span class="text-ink-2">Client:</span><span class="font-medium">Maxima LT</span></div>' +
        '<div class="flex justify-between p-3 bg-surface-1 rounded"><span class="text-ink-2">Pilot Name:</span><span class="font-medium">Maxima Akropolis</span></div>' +
        '<div class="flex justify-between p-3 bg-surface-1 rounded"><span class="text-ink-2">Data Sources:</span><span class="font-medium">Zabbix Monitoring, 12eat POS, TreeCommerce Inventory</span></div>' +
        '<div class="flex justify-between p-3 bg-surface-1 rounded"><span class="text-ink-2">Devices:</span><span class="font-medium text-ink-2">Will sync from Zabbix after creation</span></div>' +
        '<div class="flex justify-between p-3 bg-surface-1 rounded"><span class="text-ink-2">Business Hours:</span><span class="font-medium">08:00\u201322:00 Mon\u2013Sat (2 stores, POS override enabled)</span></div>' +
        '<div class="flex justify-between p-3 bg-surface-1 rounded"><span class="text-ink-2">KPI Targets:</span><span class="font-medium">Product defaults</span></div>' +
      '</div>' +
      '<div class="flex justify-between pt-2"><button class="btn btn-secondary" data-nav="new-pilot" data-tab="3">\u2190 Back</button>' +
      '<button class="btn btn-primary" onclick="toast(\'Pilot created successfully!\'); setTimeout(function(){ navigate(\'tc-hub\'); }, 1500)">Create Pilot</button></div>';
  }

  return '<div class="max-w-2xl mx-auto px-6 py-8">' +
    '<div class="breadcrumb mb-2"><a data-nav="home">Home</a> <span>/</span> New Pilot</div>' +
    '<h1 class="text-2xl font-bold mb-6">Create New Pilot</h1>' +
    '<div class="flex items-center gap-2 mb-8">' + stepIndicator + '</div>' +
    '<div class="card p-6">' + body + '</div>' +
  '</div>';
}


// ============================================================
// EVENT BINDING
// ============================================================
function bindClicks() {
  var navEls = document.querySelectorAll('[data-nav]');
  for (var i = 0; i < navEls.length; i++) {
    (function(el) {
      el.addEventListener('click', function(e) {
        e.stopPropagation();
        navigate(el.getAttribute('data-nav'), {
          id: el.getAttribute('data-id') || undefined,
          tab: el.getAttribute('data-tab') || undefined,
        });
      });
    })(navEls[i]);
  }

  // Filter chips for TC hub
  var statusChips = document.querySelectorAll('[data-filter-status]');
  for (var i = 0; i < statusChips.length; i++) {
    (function(el) {
      el.addEventListener('click', function() {
        state.filters.status = el.getAttribute('data-filter-status');
        render();
      });
    })(statusChips[i]);
  }

  // Filter chips for integrations
  var prodChips = document.querySelectorAll('[data-filter-product]');
  for (var i = 0; i < prodChips.length; i++) {
    (function(el) {
      el.addEventListener('click', function() {
        state.filters.product = el.getAttribute('data-filter-product');
        render();
      });
    })(prodChips[i]);
  }
  var intStatChips = document.querySelectorAll('[data-filter-int-status]');
  for (var i = 0; i < intStatChips.length; i++) {
    (function(el) {
      el.addEventListener('click', function() {
        state.filters.intStatus = el.getAttribute('data-filter-int-status');
        render();
      });
    })(intStatChips[i]);
  }

  // Event view toggle
  var evViewEls = document.querySelectorAll('[data-ev-view]');
  for (var i = 0; i < evViewEls.length; i++) {
    (function(el) {
      el.addEventListener('click', function() {
        state.filters.evView = el.getAttribute('data-ev-view');
        render();
      });
    })(evViewEls[i]);
  }

  // Timeline layer toggle
  var tlLayerEls = document.querySelectorAll('[data-tl-layer]');
  for (var i = 0; i < tlLayerEls.length; i++) {
    (function(el) {
      el.addEventListener('click', function() {
        state.filters.tlLayer = el.getAttribute('data-tl-layer');
        render();
      });
    })(tlLayerEls[i]);
  }
}


// ============================================================
// INIT
// ============================================================
function initFromHash() {
  var hash = window.location.hash.slice(1);
  if (!hash) { navigate('home'); return; }
  var parts = hash.split('/');
  navigate(parts[0], { id: parts[1], tab: parts[2] });
}

window.addEventListener('hashchange', initFromHash);
initFromHash();
</script>
